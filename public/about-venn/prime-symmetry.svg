  <text transform="translate(44 94)" style="fill: #4f666d; font-family: Tahoma, Tahoma; font-size: 17px; isolation: isolate;"><tspan x="0" y="0">Custom synthesis of the symmetry results attributed to Henderson (1963) and Griggs-Killian-Savage (2004).</tspan></text>
  <g>
    <text transform="translate(164 465)" style="fill: #24353a; font-family: Tahoma-Bold, Tahoma; font-size: 22px; font-weight: 700; isolation: isolate;"><tspan x="0" y="0">Prime example</tspan></text>
    <text transform="translate(62.3 494)" style="fill: #4f666d; font-family: Tahoma, Tahoma; font-size: 17px; isolation: isolate;"><tspan x="0" y="0">The classical theory allows rotational symmetry only</tspan><tspan x="48.6" y="20.4">when n is prime. In this example n = 7</tspan></text>
