    <text transform="translate(590.3 183)" style="fill: #24353a; font-family: Tahoma-Bold, Tahoma; font-size: 23px; font-weight: 700; isolation: isolate;"><tspan x="0" y="0">Research arc</tspan></text>
    <text transform="translate(517.5 221.9)" style="fill: #455f66; font-size: 18px; isolation: isolate;"><tspan x="0" y="0" style="font-family: Tahoma-Bold, Tahoma; font-weight: 700;">1963</tspan><tspan x="45.8" y="0" style="font-family: Tahoma, Tahoma;">: Henderson shows rotationally </tspan><tspan style="font-family: Tahoma, Tahoma;"><tspan x="0" y="21.6">symmetric n-Venn diagrams can exist</tspan></tspan><tspan style="font-family: Tahoma, Tahoma;"><tspan x="0" y="43.2" xml:space="preserve"> only for prime n.</tspan></tspan></text>
    <text transform="translate(515.3 296)" style="fill: #455f66; font-size: 18px; isolation: isolate;"><tspan x="0" y="0" style="font-family: Tahoma-Bold, Tahoma; font-weight: 700;">2004</tspan><tspan x="45.8" y="0" style="font-family: Tahoma, Tahoma;">: Griggs, Killian, and Savage</tspan><tspan style="font-family: Tahoma, Tahoma;"><tspan x="0" y="21.6" xml:space="preserve"> prove symmetric Venn diagrams</tspan></tspan><tspan style="font-family: Tahoma, Tahoma;"><tspan x="0" y="43.2">exist for every prime n.</tspan></tspan></text>
    <text transform="translate(516.2 367.9)" style="fill: #455f66; font-family: Tahoma, Tahoma; font-size: 18px; isolation: isolate;"><tspan x="0" y="0">The same paper also links these</tspan><tspan x="0" y="21.6">constructions to symmetric chain</tspan><tspan x="0" y="43.2" xml:space="preserve"> decompositions.</tspan></text>
